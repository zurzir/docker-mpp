services:
  # web app
  boca-web:
    image: mppbocaweb
    build:
      context: .
      dockerfile: Dockerfile
      target: mppbocaweb
    environment:
      - BOCA_DB_SUPER_PASSWORD=superpass
      - PHP_UPLOAD_MAX_FILESIZE=100M
      - PHP_POST_MAX_SIZE=100M
      - PHP_MEMORY_LIMIT=512M
    depends_on:
      boca-db:
        condition: service_healthy

  # reverse proxy for HTTPS
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BOCA_DOMAIN=${BOCA_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - boca-web

  # online judge
  boca-jail:
    image: mppbocajail
    build:
      context: .
      dockerfile: Dockerfile
      target: mppbocajail
      entitlements:
        - security.insecure
    privileged: true
    cap_add:
      - ALL
    environment:
      - BOCA_DB_SUPER_PASSWORD=superpass
    depends_on:
      boca-db:
        condition: service_healthy

  # database
  boca-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_PASSWORD=superpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  caddy_data:
  caddy_config:
